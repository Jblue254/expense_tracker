<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black p-6">

  <h1 class="text-center text-4xl font-bold mb-6 text-blue-700 uppercase tracking-wide">EXPENSE TRACKER</h1>

  <form id="expense-form" onsubmit="handleSubmit(event)" class="p-6 bg-white rounded-xl shadow-md max-w-xl mx-auto space-y-4">
    
    <div>
      <label for="category" class="block mb-1 font-medium">Category</label>
      <select id="category" class="w-full border-2 rounded p-2 bg-white">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div>
      <label for="amount" class="block mb-1 font-medium">Amount Spent ($)</label>
      <input type="number" id="amount" class="w-full border-2 rounded p-2" placeholder="e.g. 25.50" step="0.01" min="0.01" required>
    </div>

    <div>
      <label for="description" class="block mb-1 font-medium">Description</label>
      <input type="text" id="description" class="w-full border-2 rounded p-2" placeholder="e.g. Grocery Store Shopping" required>
    </div>

    <div class="flex space-x-2 pt-2">
      <button type="submit" class="flex-1 bg-blue-500 text-white p-2 rounded hover:bg-blue-600 font-medium">Add Entry</button>
      <button type="button" onclick="handleClearAll()" class="flex-1 border-2 p-2 rounded hover:bg-gray-50 font-medium">Clear All</button>
    </div>
  </form>

  <div class="mt-8 max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md">
    <div class="flex justify-between items-center">
      <h2 class="text-2xl font-semibold text-gray-800">Total Spent</h2>
      <span class="text-2xl font-black text-blue-700">$<span id="total-amount">0.00</span></span>
    </div>
  </div>

  <div class="mt-6 max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md">
    <h2 class="text-2xl font-semibold mb-4">History</h2>
    <ul id="historyList" class="space-y-2 text-gray-700"></ul>
  </div>

  <script type="module" src="tracker.js"></script>
</body>
</html>
